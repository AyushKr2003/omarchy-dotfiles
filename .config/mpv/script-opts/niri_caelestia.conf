# Generated from ~/.config/omarchy/current/theme/colors.toml by 00_omarchy_theme.lua.

# Base
language=en
icon_theme=material
font=Inter
live_reload=yes
live_reload_interval=1

# Behavior
window_top_bar=yes
window_title=no
hidetimeout=1600
fadeduration=180
fadein=yes
bottomhover=yes
bottomhover_zone=96
osc_on_seek=yes
osc_keep_with_cursor=yes

# Scaling
vidscale=no
scalewindowed=0.92
scalefullscreen=1.0

# Layout
show_title=yes
title=${media-title}
title_font_size=22
show_chapter_title=yes
chapter_fmt=- %s
timetotal=yes
time_format=dynamic
title_height=112
chapter_title_height=88

# Controls
jump_buttons=yes
jump_amount=10
chapter_skip_buttons=no
track_nextprev_buttons=yes
volume_control=yes
volume_control_type=linear
playlist_button=no
hide_empty_playlist_button=yes
speed_button=yes
speed_button_scroll=0.25
loop_button=yes
fullscreen_button=yes
info_button=no
ontop_button=no
screenshot_button=yes
download_button=no

# Omarchy palette
osc_color=#1a1b26
window_fade_alpha=0
fade_alpha=92
fade_blur_strength=0
fade_transparency_strength=50

# Progress
seek_handle_size=0.8
nibbles_style=bar
persistentprogress=no
seekbarfg_color=#7aa2f7
seekbarbg_color=#32344a
seekbar_cache_color=#444b6a
volumebar_match_seek_color=yes

# Text
title_color=#c0caf5
chapter_title_color=#a9b1d6
time_color=#444b6a
tooltip_text_color=#a9b1d6
tooltip_font_size=14

# Menu
menu_bg_color=#1a1b26
menu_fg_color=#a9b1d6
menu_alpha=24
menu_border_radius=8
menu_padding=14 18
menu_sel_color=#7aa2f7
menu_sel_bg_color=#32344a
menu_sel_fg_color=#c0caf5
menu_sel_bg_alpha=34
menu_sel_bg_radius=4
menu_sel_padding=4 8

# Thumbnail
thumbnail_border=2
thumbnail_border_radius=4
thumbnail_border_color=#32344a
thumbnail_border_outline=#1a1b26

# Buttons
windowcontrols_close_hover=#f7768e
windowcontrols_max_hover=#7aa2f7
windowcontrols_min_hover=#9ece6a

playpause_color=#7aa2f7
middle_buttons_color=#a9b1d6
side_buttons_color=#444b6a
held_element_color=#444b6a

hover_effect=size,color
hover_button_size=112
hover_effect_color=#7aa2f7

# User button 1 - playlist
usr_btn_1_icon= 󰷐
usr_btn_1_tooltip=playlist
usr_btn_1_mbtn_left_command=script-message-to niri_caelestia menu-toggle playlist; script-message-to niri_caelestia osc-hide
usr_btn_1_mbtn_right_command=
usr_btn_1_mbtn_mid_command=

# User button 2 - subtitles
usr_btn_2_icon= 
usr_btn_2_tooltip=subtitles
usr_btn_2_mbtn_left_command=script-message-to niri_caelestia menu-toggle sub; script-message-to niri_caelestia osc-hide
usr_btn_2_mbtn_right_command=cycle sub
usr_btn_2_mbtn_mid_command=cycle sub down
