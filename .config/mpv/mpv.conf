# Omarchy mpv profile

# Window and shell integration
force-window=yes
border=no
keepaspect=yes
cursor-autohide=900
autofit=72%x72%
geometry=50%:50%
title=${media-title}

# Playback
profile=high-quality
hwdec=auto-safe
vo=gpu-next
gpu-api=auto
save-position-on-quit=yes
resume-playback=yes
keep-open=no

# UI
osc=no
osd-bar=no
osd-duration=1400
osd-font=Inter
osd-font-size=24
osd-color="#e6d9db"
osd-border-color="#2c2525"
osd-shadow-color="#2c2525"
# Pure black letterboxing/pillarboxing keeps fullscreen playback distraction-free.
background-color="#000000"

# Screenshots
screenshot-format=png
screenshot-template="%F-%P"

# Subtitles
sub-auto=fuzzy
sub-font=Inter
sub-font-size=38
sub-color="#c3b7b8"
sub-border-color="#2c2525"
sub-shadow-color="#2c2525"
